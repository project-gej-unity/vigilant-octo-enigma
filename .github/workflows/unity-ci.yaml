name: Unity CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # przycisk "Run workflow" w Actions tab

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('**/Packages/manifest.json') }}
          restore-keys: |
            Library-

      - name: Run EditMode and PlayMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: 6000.3.8f1
          testMode: all
          artifactsPath: test-results

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('**/Packages/manifest.json') }}
          restore-keys: |
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion: 6000.3.8f1
          targetPlatform: StandaloneWindows64
          buildsPath: build
          buildName: CI-Build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-StandaloneWindows64
          path: build/StandaloneWindows64

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release-env   # wymaga aprowacji (ustaw w Settings → Environments)
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: Build-StandaloneWindows64
          path: build/

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-dev-${{ github.sha_short }}
          name: Pre-release dev-${{ github.sha_short }}
          prerelease: true
          generate_release_notes: true
          files: build/StandaloneWindows64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
